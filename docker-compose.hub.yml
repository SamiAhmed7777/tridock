# Standalone compose for users pulling the pre-built TRIdock image from Docker Hub.
# This starts the full wallet appliance: Triangles node + web wallet UI, in one container.
services:
  tridock:
    image: samiahmed7777/tridock:latest
    container_name: tridock-hub
    restart: unless-stopped
    ports:
      - "24116:24112/tcp"
      - "24116:24112/udp"
      - "19116:19112/tcp"
      - "4177:4177/tcp"
    environment:
      TRI_MODE: full
      TRI_NODE_NAME: tridock-hub
      TRI_INSTANCE_ID: tridock-hub
      TRI_WALLET_ID: primary
      TRI_ROLE: wallet
      TRI_VERSION: "5.7.6"
      TRI_TOR_ENABLED: "1"
      TRI_BOOTSTRAP_ENABLED: "1"
      TRI_PREFER_BOOTSTRAP: "1"
      TRI_RPCUSER: tri
      TRI_RPCPASSWORD: change-me
      TRI_RPCPORT: "19112"
      TRI_PORT: "24112"
      TRI_MAX_CONNECTIONS: "64"
      TRI_DBCACHE: "512"
      PORT: "4177"
      TRI_ENABLE_WRITE_OPS: "1"
      TRI_ALLOW_SEND_BROADCAST: "1"
      TRI_ALLOW_WALLET_UNLOCK: "1"
      TRI_ALLOW_BACKUP_EXPORT: "1"
      TRI_WALLET_EXPORT_PATH: "/tri/data/wallet.dat"
    volumes:
      - tri_data:/tri/data
      - tri_bootstrap:/tri/bootstrap
      - tri_cache:/tri/cache
      - tri_state:/tri/state
      - tri_backups:/tri/backups
      - tri_config:/tri/config
      - tri_ui_data:/tri/ui-data
      - tri_logs:/tri/logs

volumes:
  tri_data:
  tri_bootstrap:
  tri_cache:
  tri_state:
  tri_backups:
  tri_config:
  tri_ui_data:
  tri_logs:

services:
  tridock:
    build: .
    image: samiahmed7777/tridock:latest
    container_name: tridock-dev
    restart: unless-stopped
    working_dir: /tri
    ports:
      - "24116:24112/tcp"
      - "24116:24112/udp"
      - "19116:19112/tcp"
      - "4177:4177/tcp"
    environment:
      # ── Node Type ───────────────────────────────────────────────
      # Choose: full  → loads full blockchain, can stake (default)
      #          spv   → lightweight pruned wallet, no full chain needed
      # SPV is perfect for users who don't want to download 12 years of chain
      # ───────────────────────────────────────────────────────────
      TRI_NODE_TYPE: "full"

      # ── Node Mode ───────────────────────────────────────────────
      # Choose: full  → normal wallet with optional staking
      #          seed  → relay-only node, no wallet (lightweight)
      #          staking → dedicated staking wallet
      # ───────────────────────────────────────────────────────────
      TRI_MODE: "full"

      # ── Seed Isolation (only matters when TRI_MODE=seed) ────────
      # Set to "1" to clear stale peers.dat before starting,
      # preventing seed from poisoning itself on restart
      TRI_SEED_ISOLATION: "0"

      # Remove discovery/listen for seed isolation mode
      TRI_SEED_DISABLE_DISCOVERY: "0"

      # Comma-separated onion addresses to trust exclusively as seed peers
      # Example: "onion1:24112,onion2:24112"
      TRI_SEED_TRUSTED_PEERS: ""

      # Seconds to wait before starting daemon
      # Prevents multiple seed containers from contaminating each other
      SEED_STARTUP_DELAY: "0"

      # ── Core Settings ────────────────────────────────────────────
      TRI_VERSION: "5.7.9"
      TRI_TOR_ENABLED: "1"
      TRI_BOOTSTRAP_ENABLED: "1"
      TRI_PREFER_BOOTSTRAP: "1"
      TRI_BOOTSTRAP_TIMEOUT: "30"
      TRI_BOOTSTRAP_MIN_BLOCK_BYTES: "100000000"
      TRI_BOOTSTRAP_MIN_LDB_COUNT: "300"

      # Bootstrap sources (comma-separated, first available is used)
      TRI_BOOTSTRAP_URLS: "https://bootstrap.cryptographic-triangles.org/triangles-bootstrap.tar.gz,https://bootstrap.cryptographic-triangles.org/tri-bootstrap.tar.gz"

      TRI_RPCUSER: "tri"
      TRI_RPCPASSWORD: "change-me"
      TRI_RPCPORT: "19112"
      TRI_PORT: "24112"
      TRI_MAX_CONNECTIONS: "64"
      TRI_DBCACHE: "512"

      # ── Wallet Feature Flags ───────────────────────────────────
      # Write operations (address generation): off by default for safety
      TRI_ENABLE_WRITE_OPS: "0"
      # Send/broadcast transactions: off until explicitly enabled
      TRI_ALLOW_SEND_BROADCAST: "0"
      # Unlock wallet for signing: off until explicitly enabled
      TRI_ALLOW_WALLET_UNLOCK: "0"
      # Allow chain reseed/wipe: off by default
      TRI_ALLOW_RESEED: "0"
      # Allow wallet backup export: off by default
      TRI_ALLOW_BACKUP_EXPORT: "0"

      # Web UI port
      PORT: "4177"

    volumes:
      - tri_data:/tri/data
      - tri_bootstrap:/tri/bootstrap
      - tri_cache:/tri/cache
      - tri_state:/tri/state
      - tri_backups:/tri/backups
      - tri_config:/tri/config
      - tri_ui_data:/tri/ui-data
      - tri_logs:/tri/logs

  # ── Example SPV Node ──────────────────────────────────────────────
  # A lightweight wallet that doesn't download the full chain.
  # Perfect for casual users or testing. Runs in ~1 minute.
  # Copy this outside the services block and rename it to use it.
  # NOTE: uncommenting requires adding to services below
  #
  # tridock-spv:
  #   image: samiahmed7777/tridock:latest
  #   container_name: tridock-spv
  #   restart: unless-stopped
  #   working_dir: /tri
  #   ports:
  #     - "24117:24112/tcp"
  #     - "24117:24112/udp"
  #     - "19117:19112/tcp"
  #     - "4178:4177/tcp"
  #   environment:
  #     TRI_NODE_TYPE: "spv"
  #     TRI_MODE: "full"
  #     TRI_TOR_ENABLED: "1"
  #     TRI_BOOTSTRAP_ENABLED: "1"
  #     TRI_BOOTSTRAP_URLS: "https://bootstrap.cryptographic-triangles.org/triangles-bootstrap.tar.gz"
  #     TRI_RPCUSER: "tri"
  #     TRI_RPCPASSWORD: "change-me-spv"
  #     TRI_RPCPORT: "19112"
  #     TRI_PORT: "24112"
  #     TRI_ENABLE_WRITE_OPS: "1"
  #     TRI_ALLOW_SEND_BROADCAST: "1"
  #     TRI_ALLOW_WALLET_UNLOCK: "1"
  #   volumes:
  #     - tri_spv_data:/tri/data
  #     - tri_spv_state:/tri/state
  #     - tri_spv_backups:/tri/backups
  #     - tri_spv_logs:/tri/logs

volumes:
  tri_data:
  tri_bootstrap:
  tri_cache:
  tri_state:
  tri_backups:
  tri_config:
  tri_ui_data:
  tri_logs
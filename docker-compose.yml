services:
  tridock:
    build: .
    image: samiahmed7777/tridock:latest
    container_name: tridock-dev
    restart: unless-stopped
    ports:
      - "24116:24112/tcp"
      - "24116:24112/udp"
      - "19116:19112/tcp"
    environment:
      TRI_MODE: full
      TRI_NODE_NAME: tridock-dev
      TRI_VERSION: "5.7.5"
      TRI_TOR_ENABLED: "1"
      TRI_BOOTSTRAP_ENABLED: "1"
      TRI_PREFER_BOOTSTRAP: "1"
      TRI_BOOTSTRAP_TIMEOUT: "30"
      TRI_BOOTSTRAP_MIN_BLOCK_BYTES: "100000000"
      TRI_BOOTSTRAP_MIN_LDB_COUNT: "300"
      TRI_BOOTSTRAP_URLS: "https://bootstrap.cryptographic-triangles.org/tri-bootstrap.tar.gz"
      TRI_RELEASE_BASE_URL: "https://github.com/SamiAhmed7777/triangles_v5/releases/download"
      TRI_RELEASE_FILENAME: "cryptographic-triangles-daemon_5.7.5_amd64.deb"
      TRI_BIN_DOWNLOAD_URL: ""
      TRI_BIN_FALLBACK_URLS: ""
      TRI_BIN_SHA256: "696f1ae93ef9306eb0227e04f6704d17e610207552eb6ce8c7fa091f196f7500"
      TRI_RPCUSER: tri
      TRI_RPCPASSWORD: change-me
      TRI_RPCPORT: "19112"
      TRI_PORT: "24112"
      TRI_MAX_CONNECTIONS: "64"
      TRI_DBCACHE: "512"
    volumes:
      - tri_data:/tri/data
      - tri_bootstrap:/tri/bootstrap
      - tri_cache:/tri/cache
      - ./tri-bin:/tri/bin
      - ./tri-lib:/tri/lib

  tridock-web-wallet:
    build: ../tri-wallet-web
    image: samiahmed7777/tridock-web-wallet:latest
    container_name: tridock-web-wallet
    restart: unless-stopped
    ports:
      - "4177:4177"
    environment:
      PORT: "4177"
      TRI_RPC_URL: "http://tridock:19112/"
      TRI_RPC_USER: tri
      TRI_RPC_PASSWORD: change-me
      TRI_CANONICAL_RPC_URL: ""
      TRI_CANONICAL_RPC_USER: tri
      TRI_CANONICAL_RPC_PASSWORD: change-me
      TRI_STATE_DIR: "/tri/data/state"
    volumes:
      - tri_data:/tri/data:ro
    depends_on:
      - tridock

volumes:
  tri_data:
  tri_bootstrap:
  tri_cache:

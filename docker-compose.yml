services:
  tridock:
    build: .
    image: samiahmed7777/tridock:latest
    container_name: tridock-dev
    restart: unless-stopped
    ports:
      - "24116:24112/tcp"
      - "24116:24112/udp"
      - "19116:19112/tcp"
      - "4177:4177/tcp"
    environment:
      TRI_MODE: full
      TRI_NODE_NAME: tridock-dev
      TRI_INSTANCE_ID: tridock-dev
      TRI_WALLET_ID: primary
      TRI_ROLE: wallet
      TRI_VERSION: "5.7.6"
      TRI_TOR_ENABLED: "1"
      TRI_BOOTSTRAP_ENABLED: "1"
      TRI_PREFER_BOOTSTRAP: "1"
      TRI_BOOTSTRAP_TIMEOUT: "30"
      TRI_BOOTSTRAP_MIN_BLOCK_BYTES: "100000000"
      TRI_BOOTSTRAP_MIN_LDB_COUNT: "300"
      TRI_BOOTSTRAP_URLS: "https://bootstrap.cryptographic-triangles.org/tri-bootstrap.tar.gz"
      TRI_RELEASE_BASE_URL: "https://github.com/SamiAhmed7777/triangles_v5/releases/download"
      TRI_RELEASE_FILENAME: ""
      TRI_BIN_DOWNLOAD_URL: ""
      TRI_BIN_FALLBACK_URLS: ""
      TRI_BIN_SHA256: ""
      TRI_RPCUSER: tri
      TRI_RPCPASSWORD: change-me
      TRI_RPCPORT: "19112"
      TRI_PORT: "24112"
      TRI_MAX_CONNECTIONS: "64"
      TRI_DBCACHE: "512"
      PORT: "4177"
      TRI_ENABLE_WRITE_OPS: "1"
      TRI_ALLOW_SEND_BROADCAST: "1"
      TRI_ALLOW_WALLET_UNLOCK: "1"
      TRI_ALLOW_RESEED: "0"
      TRI_ALLOW_BACKUP_EXPORT: "1"
      TRI_WALLET_EXPORT_PATH: "/tri/data/wallet.dat"
    volumes:
      - tri_data:/tri/data
      - tri_bootstrap:/tri/bootstrap
      - tri_cache:/tri/cache
      - tri_state:/tri/state
      - tri_backups:/tri/backups
      - tri_config:/tri/config
      - tri_ui_data:/tri/ui-data
      - tri_logs:/tri/logs

volumes:
  tri_data:
  tri_bootstrap:
  tri_cache:
  tri_state:
  tri_backups:
  tri_config:
  tri_ui_data:
  tri_logs:

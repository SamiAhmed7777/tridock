services:
  tri-seed-1:
    image: samiahmed7777/tridock:working
    container_name: tri-seed-1
    restart: unless-stopped
    environment:
      TRI_MODE: seed
      TRI_SEED_MODE: "1"
      TRI_NODE_NAME: tri-seed-1
      TRI_INSTANCE_ID: tri-seed-1
      TRI_ROLE: seed
      TOR_SOCKS_PORT: "9050"
      TRI_STAKE_ENABLED: "0"
      TRI_ENABLE_WRITE_OPS: "0"
      TRI_ALLOW_SEND_BROADCAST: "0"
      TRI_ALLOW_WALLET_UNLOCK: "0"
      TRI_ALLOW_RESEED: "0"
      TRI_ALLOW_BACKUP_EXPORT: "0"
      TRI_BIN_DIR: "/tri/bin"
      TRI_LIB_DIR: "/tri/data/lib"
      TRI_CACHE_DIR: "/tri/data/cache"
      TRI_SEED_TRUSTED_PEERS: "6ygpphp2qsucwvhwefv6h6ehvk6zjf7b7zdp4ggkzjjwe76cg6jwm7id.onion:24112,jbpfhe7zw3qm67wy3j2ayysp3mnrjobopthnko3b3sgahqtecblwqmid.onion:24112"
      TRI_CANONICAL_RPC_URL: "http://jbpfhe7zw3qm67wy3j2ayysp3mnrjobopthnko3b3sgahqtecblwqmid.onion:19112"
      TRI_CANONICAL_RPC_USER: "trianglesrpc"
      TRI_CANONICAL_RPC_PASSWORD: "xK7mNp4QvR8sWjY2bTdL9eAf"
      TRI_SEED_ISOLATION: "1"
      TRI_VERSION: "5.8.5"
      TRI_RPCUSER: "triseed"
      TRI_RPCPASSWORD: "triSEED2026"
    volumes:
      - ./data/seed-1:/tri/data
      - ./data/seed-1:/tri/bin
      - tri-seed-1-state:/tri/state
      - tri-seed-1-logs:/tri/logs
    ports:
